<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ecotour</title>
<link href="style.css" rel="stylesheet" type="text/css">
<link rel="icon" href="images/favicon.png" type="image/png">
</head>

<body>
<header class="site-header">
    <div class="logo">EcoTour</div>
       <nav class="main-nav">
        <a href="index.html" class="active">Головна</a>
        <a href="tours.html">Наші тури</a>
        <a href="about.html">Про нас</a>
       </nav>

</header>

<main>
    <section class="hero-section">
        <h1>Відкрий для себе дику природу</h1>
        <p>Найкращі еко-маршрути Карпатами. Відпочинь від міської метушні.</p>
   
       <div class="audio-player">
        <p>Послухай звуки Карпат:</p>
        <audio controls loop>
            <source src="media/forest.mp3" type="audio/mpeg">
            Ваш браузер не підтримує аудіоелемент.
        </audio>
       </div>

    </section>
	

<section id="booking" class="booking-section">
    <h2>Залиште заявку на тур</h2>
    
    <form action="#" method="POST" class="booking-form">
        <input type="text" name="user_name" placeholder="Ваше ім'я" required>
        
        <input type="email" name="user_email" placeholder="Ваш Email" required>
        
        <input type="tel" name="user_phone" placeholder="Номер телефону">
        
        <select name="tour_choice" required>
            <option value="" disabled selected>Оберіть маршрут...</option>
            <option value="goverla">Сходження на Говерлу</option>
            <option value="synevyr">Озеро Синевир</option>
            <option value="wild">Дикі походи з наметами</option>
        </select>
        
        <textarea name="user_message" rows="4" placeholder="Додаткові побажання чи запитання..."></textarea>
        
        <button type="submit" class="btn-primary">Забронювати</button>
    </form>
</section>

	

</main>

<footer class="site-footer">
  <p>&copy; 2026 EcoTour. Всі права захищено.</p>
</footer>

</body>
</html>
